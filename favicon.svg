<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Shoka — 書架">
  <!-- 背景：深いインク色の角丸。明るいタブでも暗いタブでも映える -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#352a1b"/>
  <rect x="3.5" y="3.5" width="57" height="57" rx="11" fill="none" stroke="#6f5413" stroke-width="1.5" opacity="0.55"/>

  <!-- 書架に並ぶ背表紙（brass / oxblood / green / parchment） -->
  <g>
    <!-- brass -->
    <rect x="13" y="21" width="8" height="28" rx="1.2" fill="#b98e2a"/>
    <rect x="13" y="21" width="8" height="3.4" rx="1.2" fill="#6f5413"/>
    <rect x="14.4" y="26" width="1.1" height="18" rx="0.5" fill="#352a1b" opacity="0.35"/>
    <!-- oxblood（やや高い） -->
    <rect x="22" y="14" width="8" height="35" rx="1.2" fill="#8a3a2c"/>
    <rect x="22" y="14" width="8" height="3.4" rx="1.2" fill="#5a261c"/>
    <rect x="23.4" y="19" width="1.1" height="25" rx="0.5" fill="#2b120d" opacity="0.4"/>
    <!-- green（低め） -->
    <rect x="31" y="24" width="8" height="25" rx="1.2" fill="#3f5d44"/>
    <rect x="31" y="24" width="8" height="3.4" rx="1.2" fill="#283b2c"/>
    <rect x="32.4" y="29" width="1.1" height="15" rx="0.5" fill="#16241a" opacity="0.4"/>
    <!-- parchment（少し傾けて立てかける） -->
    <g transform="rotate(9 45 49)">
      <rect x="41" y="18" width="7.6" height="31" rx="1.2" fill="#e8dcc0"/>
      <rect x="41" y="18" width="7.6" height="3.4" rx="1.2" fill="#9c7820"/>
      <rect x="42.3" y="23" width="1" height="21" rx="0.5" fill="#9a8a6e" opacity="0.5"/>
    </g>
  </g>

  <!-- 棚板 -->
  <rect x="11" y="49" width="42" height="5" rx="1.6" fill="#6f5413"/>
  <rect x="11" y="53.2" width="42" height="1.6" rx="0.8" fill="#4a3a14"/>
</svg>
